<!DOCTYPE html>
<html>
<head>
    <title>Monitoratge Satèl·lit</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
    </style>
</head>
<body>
    <div class="card">
       <h3>Controls del Satèl·lit</h3>
       <button onclick="enviarOrdre('camera')">Activar Càmera</button>
       <button onclick="enviarOrdre('solar')">Activar Panells</button>
    </div>

    <script>
        function enviarOrdre(accio) {
            fetch('/ordre', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accio: accio })
            })
            .then(response => response.json())
            .then(data => console.log('Ordre enviada:', data));
        }
        // ... mantén el teu script actual (actualitzarDades) aquí sota        
    </script>

</body>
</html>
